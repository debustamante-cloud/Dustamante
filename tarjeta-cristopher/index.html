<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Cristopher 🤍</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    
    <div class="app-container">
        <!-- Background elements for aesthetic -->
        <div class="bg-blur decoration-1"></div>
        <div class="bg-blur decoration-2"></div>

        <!-- SCREEN 1: PORTADA -->
        <section class="screen active" id="screen-1">
            <div class="card">
                <!-- Progress dots -->
                <div class="progress-dots">
                    <span class="dot active"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
                
                <div class="envelope-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.2 8.4c.5.38.8.97.8 1.6v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V10a2 2 0 0 1 .8-1.6l8-6a2 2 0 0 1 2.4 0l8 6Z"></path>
                        <path d="m22 10-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 10"></path>
                    </svg>
                </div>

                <div class="badge">
                    <span>TIENES UN MENSAJE</span>
                </div>

                <h1 class="main-title">Hola, Cristopher 🤍</h1>
                
                <p class="subtitle">Alguien muy especial preparó algo para ti. ¿Estás listo para abrirlo?</p>

                <button class="btn btn-primary" id="btn-open">
                    Abrir <span class="emoji">💌</span>
                </button>
            </div>
        </section>

        <!-- SCREEN 2: FELIZ CUMPLEAÑOS -->
        <section class="screen" id="screen-2">
            <div class="card card-romantic glow">
                 <div class="progress-dots">
                    <span class="dot filled"></span>
                    <span class="dot active"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>

                <div class="floating-hearts" id="hearts-container">
                    <!-- Hearts generated by JS -->
                </div>

                <h2 class="romantic-title">Feliz cumpleaños, mi amor ❤️</h2>
                
                <button class="btn btn-secondary mt-auto" id="btn-next-2">
                    Continuar <span class="emoji">✨</span>
                </button>
            </div>
        </section>

        <!-- SCREEN 3: MENSAJE LARGO -->
        <section class="screen" id="screen-3">
            <div class="card card-message">
                <div class="progress-dots top-right">
                    <span class="dot filled"></span>
                    <span class="dot filled"></span>
                    <span class="dot active"></span>
                    <span class="dot"></span>
                </div>
                
                <div class="message-container">
                    <p class="typewriter-text" id="typewriter-text"></p>
                </div>

                <button class="btn btn-secondary mt-auto fade-in-hidden" id="btn-next-3">
                    Siguiente <span class="emoji">🌸</span>
                </button>
            </div>
        </section>

        <!-- SCREEN 4: PANTALLA FINAL -->
        <section class="screen" id="screen-4">
            <div class="card card-final">
                 <div class="progress-dots top-right">
                    <span class="dot filled"></span>
                    <span class="dot filled"></span>
                    <span class="dot filled"></span>
                    <span class="dot active"></span>
                </div>

                <h2 class="final-message scale-in">te amo para siempre mi treitón, feliz cumpleaños!!</h2>
                
                <div class="party-decorations">
                    <span class="party-emoji" style="--delay: 0.1s">🎉</span>
                    <span class="party-emoji" style="--delay: 0.3s">🎊</span>
                    <span class="party-emoji" style="--delay: 0.5s">🎺</span>
                </div>

                <button class="btn btn-outline mt-auto" id="btn-restart">
                    Ver de nuevo <span class="emoji">↺</span>
                </button>
            </div>
        </section>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="./main.js"></script>
</body>
</html>
